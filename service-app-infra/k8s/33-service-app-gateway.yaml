apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-app-gateway
  namespace: service-app
  labels:
    app: service-app-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-app-gateway
  template:
    metadata:
      labels:
        app: service-app-gateway
    spec:
      serviceAccountName: service-app-sa
      containers:
        - name: service-app-gateway
          image: service-app-gateway:1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          env:
            - name: OTEL_SERVICE_NAME
              value: "service-app-gateway"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_EXPORTER
              valueFrom:
                secretKeyRef:
                  name: service-app-secrets
                  key: OTEL_TRACES_EXPORTER
            # Downstream service URLs (platform DNS)
            - name: MEMBER_REQUEST_SERVICE_URL
              value: "http://member-request-service:8084"
            - name: MEMBER_SERVICE_URL
              value: "http://member-service:8081"
            - name: PRICING_SERVICE_URL
              value: "http://pricing-service:8082"
            # Redis (rate limiter)
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: service-app-secrets
                  key: REDIS_PASSWORD
            # Keycloak
            - name: KEYCLOAK_REALM_URL
              value: "http://keycloak:8080/realms/service-app-realm"
            # CORS
            - name: CORS_ALLOWED_ORIGIN
              value: "http://localhost:4200"
            - name: PORT
              value: ":8090"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
              ephemeral-storage: "256Mi"
            limits:
              memory: "512Mi"
              cpu: "1000m"
              ephemeral-storage: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: service-app-gateway
  namespace: service-app
spec:
  type: NodePort
  selector:
    app: service-app-gateway
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090
