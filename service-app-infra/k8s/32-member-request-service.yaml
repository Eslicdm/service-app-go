apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-request-service
  namespace: service-app
  labels:
    app: member-request-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member-request-service
  template:
    metadata:
      labels:
        app: member-request-service
    spec:
      serviceAccountName: service-app-sa
      containers:
        - name: member-request-service
          image: member-request-service:1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          env:
            - name: OTEL_SERVICE_NAME
              value: "member-request-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector:4318"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
            - name: OTEL_TRACES_EXPORTER
              valueFrom:
                secretKeyRef:
                  name: service-app-secrets
                  key: OTEL_TRACES_EXPORTER
            # Redis (request dedup)
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: service-app-secrets
                  key: REDIS_PASSWORD
            # Kafka (produce member requests)
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: KAFKA_TOPIC
              value: "member.requests.topic"
            # Keycloak
            - name: KEYCLOAK_REALM_URL
              value: "http://keycloak:8080/realms/service-app-realm"
            - name: PORT
              value: ":8084"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "256Mi"
            limits:
              memory: "256Mi"
              cpu: "500m"
              ephemeral-storage: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: member-request-service
  namespace: service-app
spec:
  selector:
    app: member-request-service
  ports:
    - port: 8084
      targetPort: 8084
